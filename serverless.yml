service: lambda-bert-huggingface

frameworkVersion: '3'

provider:
  name: aws
  region: ${opt:region, 'us-east-1'}
  memorySize: 5120
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
      Resource: arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:service}-customerTable-${sls:stage}
  ecr:
    images:
      bert-qa-image:
        path: serverless_bert_qa
        file: dockerfile
      textgen-image:
        path: serverless_text_generation
        file: dockerfile

functions:
  questionanswering:
    environment:
      DYNAMODB_TABLE: ${self:service}-customerTable-${sls:stage}
    image:
      name: bert-qa-image
    events:
      - http:
          path: qa
          method: post

  textgeneration:
    image:
      name: textgen-image
    events:
      - http:
          path: textgen
          method: post

resources:
  Resources:
    CustomerTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: primary_key
            AttributeType: S
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: primary_key
            KeyType: HASH
        TableName: ${self:service}-customerTable-${sls:stage}
